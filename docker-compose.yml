version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leiloes-db
    environment:
      POSTGRES_DB: leiloes
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: