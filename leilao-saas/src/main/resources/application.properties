# ── Banco de dados ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/leiloes
spring.datasource.username=usuario
spring.datasource.password=senha
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões (HikariCP — default do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway (migrations automáticas) ──────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Scheduler ─────────────────────────────────────────────────
# Habilita o @Scheduled no Spring
spring.task.scheduling.pool.size=4

# Horário da coleta diária (cron: seg=0, min=0, hora=6)
leilao.scraper.cron=0 0 6 * * *

# ── Scrapers ──────────────────────────────────────────────────
# Delay entre requisições (ms) — evita bloqueio dos portais
leilao.scraper.delay-min-ms=2000
leilao.scraper.delay-max-ms=5000
leilao.scraper.max-retries=3
leilao.scraper.page-timeout-ms=30000
# Selenium em modo headless (false = abre janela, útil para debug)
leilao.scraper.headless=true
# UFs para coleta da Caixa
leilao.scraper.caixa.ufs=SP,RJ,MG,RS,PR,SC,BA,GO,DF,CE
# Máx. de páginas por scraper por execução
leilao.scraper.max-paginas=5

# ── Motor de Score ────────────────────────────────────────────
leilao.score.peso-desconto=0.40
leilao.score.peso-financiamento=0.25
leilao.score.peso-localizacao=0.20
leilao.score.peso-risco=0.15

leilao.score.desconto-min-pct=10.0
leilao.score.desconto-max-pct=50.0

leilao.score.bonus-financiamento=50.0
leilao.score.bonus-fgts=30.0
leilao.score.bonus-caixa=20.0

leilao.score.penalidade-ocupado=40.0
leilao.score.penalidade-sem-avaliacao=20.0
leilao.score.penalidade-segunda-praca=10.0
leilao.score.bonus-judicial=10.0

leilao.score.minimo-listagem=30.0

# ── Logs ──────────────────────────────────────────────────────
logging.level.com.leilao=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] %msg%n
